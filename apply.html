<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 도서 신청 시스템</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           🎨 기존 교무실 대시보드 디자인 시스템 계승
           ========================================== */
        body { 
            font-family: 'Noto Sans KR', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; 
            font-weight: 400; 
            background-color: #e9ecef; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            transition: background 0.3s, color 0.3s;
        }
        input, select, button, textarea { font-family: inherit; box-sizing: border-box; } 

        .header-area h1, .section-title, .add-btn, .toggle-dark-btn, .book-title {
            font-family: 'Noto Sans KR', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            font-weight: 700;
        }

        .app-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 16px; }

        /* === 헤더 구역 === */
        .header-area { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background-color: #2c3e50; 
            color: white; 
            padding: 18px 24px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header-area h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }
        
        .toggle-dark-btn {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .toggle-dark-btn:hover { background-color: rgba(255, 255, 255, 0.2); transform: translateY(-1px); }

        /* === 현재 차수 안내 바 === */
        .term-badge-bar {
            background-color: #fff3cd;
            border-left: 5px solid #ffc107;
            color: #856404;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* === 섹션 공통 스타일 === */
        .section { 
            background-color: white; 
            padding: 24px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
        }
        .section-title { font-size: 18px; color: #34495e; margin-top: 0; margin-bottom: 16px; border-bottom: 2px solid #ecf0f1; padding-bottom: 8px; }

        /* === 도서 검색 UI === */
        .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .search-input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #bdc3c7; 
            border-radius: 8px; 
            font-size: 15px; 
            background-color: #f8f9fa;
        }
        .search-input:focus { outline: none; border-color: #3498db; background-color: white; }
        
        .search-btn { 
            background-color: #3498db; 
            color: white; 
            border: none; 
            padding: 0 24px; 
            border-radius: 8px; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        .search-btn:hover { background-color: #2980b9; }

        /* === 검색 결과 목록 === */
        .search-results { 
            max-height: 320px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            padding-right: 4px;
        }
        .book-card {
            display: flex;
            gap: 14px;
            background: #f8f9fa;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .book-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.05); border-color: #3498db; }
        .book-card.selected { border-color: #27ae60; background-color: #f0fdf4; }
        .book-thumb { width: 70px; height: 100px; object-fit: cover; background: #edf2f7; border-radius: 4px; flex-shrink: 0; }
        .book-info { display: flex; flex-direction: column; justify-content: center; gap: 4px; font-size: 14px; color: #4a5568; }
        .book-title { font-size: 16px; color: #1a202c; margin: 0; }
        
        /* === 알림 메시지 배지 === */
        .validation-msg {
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 16px;
            display: none;
        }
        .msg-error { background-color: #fdedec; color: #e74c3c; border-left: 5px solid #e74c3c; }
        .msg-warn { background-color: #fff3e0; color: #e67e22; border-left: 5px solid #e67e22; }
        .msg-success { background-color: #eafaf1; color: #2ecc71; border-left: 5px solid #2ecc71; }

        /* === 신청서 폼 UI === */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group label { font-size: 14px; font-weight: bold; color: #4a5568; }
        
        .form-control { 
            padding: 12px; 
            border: 1px solid #bdc3c7; 
            border-radius: 8px; 
            font-size: 15px; 
            background-color: #f8f9fa;
        }
        .form-control:focus { outline: none; border-color: #3498db; background-color: white; }
        .form-control:disabled { background-color: #e2e8f0; color: #a0aec0; cursor: not-allowed; }
        textarea.form-control { resize: vertical; min-height: 100px; }

        .submit-btn { 
            width: 100%; 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s; 
        }
        .submit-btn:hover { background-color: #219a52; }
        .submit-btn:disabled { background-color: #95a5a6; cursor: not-allowed; }

        /* === 스크롤바 커스텀 === */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.03); }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

        /* ==========================================
           🌓 다크모드 (기존 글래스모피즘 테마 매칭)
           ========================================== */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            background-attachment: fixed;
            color: #cccccc;
        }
        body.dark-mode .section {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        body.dark-mode .section-title { color: #ffffff; border-bottom-color: rgba(255,255,255,0.1); }
        body.dark-mode .term-badge-bar { background: rgba(241,196,15,0.15); color: #f1c40f; border-left-color: #f1c40f; }
        body.dark-mode .book-title { color: #ffffff; }
        body.dark-mode .book-card { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); color: #cccccc; }
        body.dark-mode .book-card:hover { border-color: #3498db; background: rgba(52,152,219,0.1); }
        body.dark-mode .book-card.selected { border-color: #27ae60; background-color: rgba(39,174,96,0.15); }
        body.dark-mode .form-group label { color: #aaaaaa; }
        body.dark-mode .search-input, body.dark-mode .form-control {
            background: rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.15);
            color: #ffffff;
        }
        body.dark-mode .search-input:focus, body.dark-mode .form-control:focus { border-color: #3498db; background: rgba(52,152,219,0.05); }
        body.dark-mode .form-control:disabled { background: rgba(255,255,255,0.02); color: #555; }
        body.dark-mode ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
        body.dark-mode ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }

        /* === 뒤로가기 버튼 === */
        .back-btn {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
        }
        .back-btn:hover { background-color: rgba(255,255,255,0.15); color: white; }

        /* === 신청자 유형 토글 버튼 === */
        .type-toggle { display: flex; gap: 8px; }
        .type-btn {
            flex: 1;
            padding: 11px 12px;
            border-radius: 8px;
            border: 2px solid #bdc3c7;
            background: #f8f9fa;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            color: #4a5568;
        }
        .type-btn.active { background-color: #2c3e50; color: white; border-color: #2c3e50; }
        .type-btn:hover:not(.active) { border-color: #2c3e50; background-color: #edf2f7; }

        /* === 학년 / 반 / 번호 숫자 입력 === */
        .student-info-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .num-input-group  { display: flex; align-items: center; gap: 6px; }
        .num-input-group .form-control { width: 80px; text-align: center; padding: 12px 8px; }
        .num-label { font-size: 15px; color: #4a5568; font-weight: 700; white-space: nowrap; }

        /* === 추가 요청 체크박스 === */
        .extra-checkbox {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f0f7ff;
            border: 1px solid #bee3f8;
            border-radius: 8px;
            padding: 14px 16px;
        }
        .extra-checkbox input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; accent-color: #3498db; }
        .checkbox-label { font-size: 14px; color: #2c5282; cursor: pointer; font-weight: 700; line-height: 1.4; }

        /* 다크모드 추가 */
        body.dark-mode .type-btn { background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.2); color: #cccccc; }
        body.dark-mode .type-btn.active { background-color: #2c3e50; color: white; border-color: #2c3e50; }
        body.dark-mode .num-label { color: #cccccc; }
        body.dark-mode .extra-checkbox { background: rgba(52,152,219,0.1); border-color: rgba(52,152,219,0.3); }
        body.dark-mode .checkbox-label { color: #90cdf4; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="app-container">
        
        <div class="header-area">
            <h1>📚 도서 신청하기</h1>
            <div style="display:flex; gap:8px; align-items:center;">
                <a href="index.html" class="back-btn">← 처음으로</a>
                <button class="toggle-dark-btn" id="darkModeBtn" onclick="toggleDarkMode()">🌙 다크모드</button>
            </div>
        </div>

        <div class="term-badge-bar">
            <span>📌 현재 진행 차수: <span id="currentTermText">불러오는 중...⏳</span></span>
            <span style="font-size: 13px; font-weight: normal;">(1인당 최대 5권 신청 가능)</span>
        </div>

        <div class="section">
            <div class="section-title">🔍 1단계: 신청할 도서 검색하기</div>
            <div class="search-row">
                <input type="text" id="bookSearchInput" class="search-input" placeholder="책 제목, 저자 또는 ISBN을 입력하세요..." onkeydown="if(event.key==='Enter') searchBooks()">
                <button class="search-btn" onclick="searchBooks()">검색</button>
            </div>
            <div class="search-results" id="searchResultsContainer">
                <div style="text-align: center; color: #7f8c8d; padding: 20px;">검색 결과가 여기에 표시됩니다. 📚</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">📝 2단계: 신청자 정보 및 사유 입력</div>

            <div id="validationBadge" class="validation-msg"></div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="studentName">신청자 성명</label>
                    <input type="text" id="studentName" class="form-control" placeholder="이름을 입력하세요">
                </div>
                <div class="form-group">
                    <label>신청자 유형</label>
                    <div class="type-toggle">
                        <button type="button" class="type-btn active" id="typeStudent" onclick="selectType('student')">🎒 학생</button>
                        <button type="button" class="type-btn" id="typeTeacher" onclick="selectType('teacher')">👨‍🏫 교직원</button>
                    </div>
                </div>
                <div class="form-group full-width" id="studentFields">
                    <label>소속 학년 / 반 / 번호</label>
                    <div class="student-info-row">
                        <div class="num-input-group">
                            <input type="number" id="studentGrade" class="form-control" min="1" max="3" placeholder="학년">
                            <span class="num-label">학년</span>
                        </div>
                        <div class="num-input-group">
                            <input type="number" id="studentClass" class="form-control" min="1" max="9" placeholder="반">
                            <span class="num-label">반</span>
                        </div>
                        <div class="num-input-group">
                            <input type="number" id="studentNumber" class="form-control" min="1" max="40" placeholder="번호">
                            <span class="num-label">번</span>
                        </div>
                    </div>
                </div>
                <div class="form-group full-width" id="teacherFields" style="display:none;">
                    <label for="teacherDept">소속 부서</label>
                    <select id="teacherDept" class="form-control">
                        <option value="">부서를 선택하세요</option>
                        <option>교무부</option>
                        <option>교육과정부</option>
                        <option>1학년부</option>
                        <option>2학년부</option>
                        <option>3학년부</option>
                        <option>과학정보부</option>
                        <option>학생생활지원부</option>
                        <option>건강체육부</option>
                        <option>인문사회부</option>
                        <option>진로진학지원부</option>
                        <option>행정실</option>
                        <option>연구부</option>
                        <option>행정실장</option>
                        <option>교감</option>
                        <option>교장</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <div class="extra-checkbox" id="studentCheckboxWrap">
                        <input type="checkbox" id="consultingCheck">
                        <label for="consultingCheck" class="checkbox-label">📖 이 책으로 독서상담(세특, 창체 등 추가활동)을 받고 싶어요</label>
                    </div>
                    <div class="extra-checkbox" id="teacherCheckboxWrap" style="display:none;">
                        <input type="checkbox" id="classUseCheck">
                        <label for="classUseCheck" class="checkbox-label">🏫 이 책은 수업 활용 도서예요</label>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label for="requestReason">신청 사유</label>
                    <textarea id="requestReason" class="form-control" placeholder="학교 도서관에 이 책이 필요한 이유를 적어주세요... (예: 수행평가 참고 도서, 진로 탐색 등)"></textarea>
                </div>
            </div>

            <button class="submit-btn" id="submitRequestBtn" onclick="submitBookRequest()" disabled>📚 도서 신청서 제출하기</button>
        </div>

    </div>

    <script>
        // ============================================================
        // 🗄️ Firebase 설정 (기존 교무실 대시보드 프로젝트 정보 연동)
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCaQkm4VDvmLVmltgwLwN3uYP-ShC6Pb3o",
            authDomain: "school-briefing-a5ab2.firebaseapp.com",
            projectId: "school-briefing-a5ab2",
            storageBucket: "school-briefing-a5ab2.firebasestorage.app",
            messagingSenderId: "898677514153",
            appId: "1:898677514153:web:cff731e4ff2c408c156eb8",
            measurementId: "G-M1SQXZ2LZQ"
        };
        
        firebase.initializeApp(firebaseConfig);
        const fbDb = firebase.firestore();

        // 🔑 카카오 REST API 키 설정 (선생님의 카카오 API Key를 여기에 입력하세요)
        const KAKAO_REST_API_KEY = "e86ae02ab786ca4afc53b6ea11ed5376"; 

        let selectedBook = null;
        let selectedUserType = 'student';
        let currentActiveTerm = "2026년 3차 도서신청"; // 기본값 (DB 로드 실패 시 적용)
        let allInventoryCache = null; // 소장 목록 캐시 (페이지 로드 시 한 번만 불러옴)

        // 로드 시 초기화
        window.addEventListener('DOMContentLoaded', async () => {
            initDarkMode();
            await loadLibrarySettings();
        });

        // ======= ⚙️ 파이어베이스 연동 및 환경 정보 로드 =======
        async function loadLibrarySettings() {
            try {
                // 루트 컬렉션의 librarySettings/config 문서에서 현재 설정된 차수를 읽어옵니다.
                const configDoc = await fbDb.collection('librarySettings').doc('config').get();
                if (configDoc.exists && configDoc.data().currentTerm) {
                    currentActiveTerm = configDoc.data().currentTerm;
                }
                document.getElementById('currentTermText').textContent = currentActiveTerm;

                // 소장 목록 전체를 여기서 딱 한 번만 불러와 캐시에 저장
                // 이후 복본 검색은 Firebase를 다시 찌르지 않고 이 캐시에서 비교
                const inventorySnap = await fbDb.collection('libraryInventory').get();
                allInventoryCache = inventorySnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

            } catch (e) {
                console.error("차수 로드 실패, 기본값으로 작동합니다:", e);
                document.getElementById('currentTermText').textContent = currentActiveTerm;
                allInventoryCache = []; // 로드 실패 시 빈 배열로 초기화
            }
        }

        // ======= 🔍 카카오 책 검색 API 기능 =======
        async function searchBooks() {
            const query = document.getElementById('bookSearchInput').value.trim();
            if (!query) { alert('검색어를 입력해 주세요!'); return; }

            const container = document.getElementById('searchResultsContainer');
            container.innerHTML = `<div style="text-align: center; color: #7f8c8d; padding: 20px;">⏳ 책을 열심히 검색하고 있어요...</div>`;

            if (KAKAO_REST_API_KEY === "YOUR_KAKAO_REST_API_KEY") {
                container.innerHTML = `<div style="text-align: center; color: #e74c3c; padding: 20px;">⚠️ 소스코드 상단의 KAKAO_REST_API_KEY가 유효하지 않습니다. 개발자 센터에서 키를 발급받아 교체해주세요!</div>`;
                return;
            }

            try {
                const url = `https://dapi.kakao.com/v3/search/book?query=${encodeURIComponent(query)}&size=15`;
                const response = await fetch(url, {
                    headers: { "Authorization": `KakaoAK ${KAKAO_REST_API_KEY}` }
                });
                const data = await response.json();

                if (!data.documents || data.documents.length === 0) {
                    container.innerHTML = `<div style="text-align: center; color: #e74c3c; padding: 20px;">😭 검색 결과가 없습니다. 도서명을 다시 확인해 주세요.</div>`;
                    return;
                }

                container.innerHTML = data.documents.map((book, idx) => {
                    const isbn = book.isbn.split(' ')[1] || book.isbn.split(' ')[0] || '없음';
                    const escapedTitle = book.title.replace(/'/g, "\\'");
                    const escapedAuthor = book.authors.join(', ').replace(/'/g, "\\'");
                    const escapedPub = book.publisher.replace(/'/g, "\\'");

                    return `
                        <div class="book-card" id="bookCard_${idx}" onclick="selectBook(${idx}, '${escapedTitle}', '${escapedAuthor}', '${escapedPub}', '${isbn}', '${book.thumbnail}')">
                            <img src="${book.thumbnail || 'https://via.placeholder.com/70x100?text=No+Image'}" class="book-thumb" alt="표지">
                            <div class="book-info">
                                <h4 class="book-title">${book.title}</h4>
                                <div><strong>저자:</strong> ${book.authors.join(', ') || '미상'} | <strong>출판사:</strong> ${book.publisher}</div>
                                <div style="font-size:12px; color:#a0aec0;">ISBN: ${isbn}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                // 책 정보를 담아두기 위한 전역 캐시 배열 처리
                window.searchedBooksCache = data.documents;

            } catch (e) {
                console.error("검색 오류:", e);
                container.innerHTML = `<div style="text-align: center; color: #e74c3c; padding: 20px;">❌ 통신 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.</div>`;
            }
        }

        // ======= 📚 책 선택 및 스마트 복본(중복) 검증 시스템 =======
        async function selectBook(idx, title, author, publisher, isbn, thumbnail) {
            // UI 카드 시각 효과 처리
            document.querySelectorAll('.book-card').forEach(card => card.classList.remove('selected'));
            document.getElementById(`bookCard_${idx}`).classList.add('selected');

            selectedBook = { title, author, publisher, isbn, thumbnail };
            
            // 복본 필터링 동작 시작
            await runDuplicationCheck(title, author, isbn);
        }

        // 🛠️ 3단계 복본 확인 알고리즘
        async function runDuplicationCheck(title, author, isbn) {
            const badge = document.getElementById('validationBadge');
            const submitBtn = document.getElementById('submitRequestBtn');
            
            badge.style.display = 'block';
            badge.className = 'validation-msg'; // 클래스 초기화
            badge.innerHTML = "⏳ 학교 도서관 소장 목록과 중복 여부를 대조하는 중입니다...";
            submitBtn.disabled = true;

            try {
                // [1단계] 가장 강력한 식별자인 ISBN 매칭 검사
                if (isbn && isbn !== '없음') {
                    const cleanIsbn = isbn.replace(/-/g, '').trim();
                    const isbnCheck = await fbDb.collection('libraryInventory').doc(cleanIsbn).get();
                    
                    if (isbnCheck.exists) {
                        const invData = isbnCheck.data();
                        badge.classList.add('msg-error');
                        badge.innerHTML = `❌ 신청 불가: 우리 학교 도서관에 이미 소장 중인 도서입니다.<br><small>(청구기호: ${invData.callNumber || '서가 확인 필요'})</small>`;
                        return;
                    }
                }

                // [2단계 & 3단계] 제목과 저자를 기반으로 정밀 매칭 및 유사도 검사
                // Firebase를 다시 찌르지 않고 페이지 로드 시 불러온 캐시에서 비교
                const inventoryData = allInventoryCache || [];
                
                let exactMatch = false;
                let suspectMatch = null;

                // 문장 부호, 공백을 제거하여 순수 뼈대 텍스트만 추출하는 헬퍼 함수
                const cleanString = str => str.replace(/[^가-힣a-zA-Z0-9]/g, '').toLowerCase().trim();

                // 저자 문자열을 정제된 저자 이름 배열로 변환하는 헬퍼 함수
                // 예) "류츠신 지음;이현아 옮김" → ["류츠신", "이현아"]
                const cleanAuthors = str => str.split(';')
                    .map(part => {
                        part = part.replace(/\[공\]/g, '');           // [공] 제거
                        part = part.replace(/[·][가-힣]+/g, '');      // ·사진, ·그림 등 복합 역할어 제거
                        part = part.replace(/지음|옮김|글|그림|사진|편저|엮음|역|저|편/g, ''); // 역할어 제거
                        return cleanString(part);
                    })
                    .filter(s => s.length > 0);

                // 두 저자 배열 사이에 공통 저자가 하나라도 있으면 true
                const authorsOverlap = (a, b) => a.some(name => b.includes(name));

                const targetTitleClean = cleanString(title);
                const targetAuthors = cleanAuthors(author);

                inventoryData.forEach(inv => {
                    const invTitleClean = cleanString(inv.title || '');
                    const invAuthors = cleanAuthors(inv.author || '');
                    const authorsMatch = authorsOverlap(targetAuthors, invAuthors);

                    // [2단계] 제목과 저자(공통 저자 1명 이상)가 일치하는 경우
                    if (invTitleClean === targetTitleClean && authorsMatch) {
                        exactMatch = true;
                        suspectMatch = inv;
                    } 
                    // [3단계] 저자가 겹치고, 제목이 포함관계인 경우 (시리즈·개정판 등)
                    else if (!exactMatch && authorsMatch && (invTitleClean.includes(targetTitleClean) || targetTitleClean.includes(invTitleClean))) {
                        suspectMatch = inv;
                    }
                });

                if (exactMatch) {
                    badge.classList.add('msg-error');
                    badge.innerHTML = `❌ 신청 불가: 학교 도서관에 동일한 서명과 저자의 책이 이미 소장 중입니다.<br><small>(청구기호: ${suspectMatch.callNumber || '서가 확인 필요'})</small>`;
                    return;
                }

                if (suspectMatch) {
                    badge.classList.add('msg-warn');
                    badge.innerHTML = `⚠️ 동일 작품일 수 있습니다. 신청 전 도서관에서 직접 확인해 주세요.<br><small>📖 소장 도서: ${suspectMatch.title} | 저자: ${suspectMatch.author || '미상'} | 청구기호: ${suspectMatch.callNumber || '서가 확인 필요'}</small>`;
                    submitBtn.disabled = false;
                    return;
                }

                // 모든 바리케이드를 통과한 완전 신작 도서인 경우
                badge.classList.add('msg-success');
                badge.innerHTML = `✨ 신청 가능: 우리 학교 도서관에 없는 새로운 도서입니다! 신청서를 마저 채워 제출해 주세요.`;
                submitBtn.disabled = false;

            } catch(e) {
                console.error("복본 확인 중 오류 발생:", e);
                badge.classList.add('msg-warn');
                badge.innerHTML = "⚠️ 소장 도서 데이터 검증 시스템과의 일시적 통신 오류가 발생했습니다. 신청 처리는 허용됩니다.";
                submitBtn.disabled = false;
            }
        }

        // ======= 👤 신청자 유형 전환 =======
        function selectType(type) {
            selectedUserType = type;
            document.getElementById('typeStudent').classList.toggle('active', type === 'student');
            document.getElementById('typeTeacher').classList.toggle('active', type === 'teacher');
            document.getElementById('studentFields').style.display       = type === 'student' ? 'flex' : 'none';
            document.getElementById('teacherFields').style.display       = type === 'teacher' ? 'flex' : 'none';
            document.getElementById('studentCheckboxWrap').style.display = type === 'student' ? 'flex' : 'none';
            document.getElementById('teacherCheckboxWrap').style.display = type === 'teacher' ? 'flex' : 'none';
            document.getElementById('consultingCheck').checked = false;
            document.getElementById('classUseCheck').checked  = false;
        }

        function getStudentInfo() {
            if (selectedUserType === 'student') {
                const g = parseInt(document.getElementById('studentGrade').value);
                const c = parseInt(document.getElementById('studentClass').value);
                const n = parseInt(document.getElementById('studentNumber').value);
                return g + '학년 ' + c + '반 ' + n + '번';
            }
            return document.getElementById('teacherDept').value;
        }

        function validateStudentInfo() {
            if (selectedUserType === 'student') {
                const g = parseInt(document.getElementById('studentGrade').value);
                const c = parseInt(document.getElementById('studentClass').value);
                const n = parseInt(document.getElementById('studentNumber').value);
                if (!g || g < 1 || g > 3)  { alert('학년은 1~3 사이로 입력해주세요.'); return false; }
                if (!c || c < 1 || c > 9)  { alert('반은 1~9 사이로 입력해주세요.');   return false; }
                if (!n || n < 1 || n > 40) { alert('번호는 1~40 사이로 입력해주세요.'); return false; }
            } else {
                if (!document.getElementById('teacherDept').value) { alert('소속 부서를 선택해주세요.'); return false; }
            }
            return true;
        }

        // ======= 🚀 최종 도서 신청서 파이어스토어 적재 =======
        async function submitBookRequest() {
            if (!selectedBook) { alert('먼저 도서를 검색하고 선택해 주세요!'); return; }

            const sName = document.getElementById('studentName').value.trim();
            const reason = document.getElementById('requestReason').value.trim();

            if (!sName) { alert('신청자 성명을 입력해 주세요.'); return; }
            if (!validateStudentInfo()) return;
            if (!reason) { alert('도서 구입의 타당한 이유 및 사유를 적어주세요.'); return; }

            const sInfo = getStudentInfo();
            const extraRequest = selectedUserType === 'student'
                ? document.getElementById('consultingCheck').checked
                : document.getElementById('classUseCheck').checked;

            const submitBtn = document.getElementById('submitRequestBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = "⏳ 신청서를 금고에 저장하는 중...";

            try {
                // 🛑 1인당 5권 신청 제한 걸러내기 내부 로직 동작
                const requestQuery = await fbDb.collection('bookRequests')
                    .where('term', '==', currentActiveTerm)
                    .where('studentName', '==', sName)
                    .where('studentInfo', '==', sInfo)
                    .get();

                if (requestQuery.size >= 5) {
                    alert(`✋ 신청 불가!\n\n${sName}님은 현재 차수(${currentActiveTerm})에 이미 5권의 도서 신청을 완료하셨기 때문에 더 이상 신청하실 수 없습니다.`);
                    submitBtn.disabled = false;
                    submitBtn.textContent = "📚 도서 신청서 제출하기";
                    return;
                }

                // 규격 통과 완료 후 최종 파이어스토어 컬렉션에 적재
                await fbDb.collection('bookRequests').add({
                    title: selectedBook.title,
                    author: selectedBook.author,
                    publisher: selectedBook.publisher,
                    isbn: selectedBook.isbn,
                    thumbnail: selectedBook.thumbnail,
                    studentName: sName,
                    studentInfo: sInfo,
                    studentType: selectedUserType,
                    extraRequest: extraRequest,
                    reason: reason,
                    term: currentActiveTerm,
                    status: "대기 중",
                    rejectReason: "",
                    createdAt: Date.now()
                });

                alert(`🎉 도서 신청이 정상적으로 접수되었습니다!\n관리자 선생님의 승인 후 도서 구매가 확정됩니다.`);
                
                // 제출 완료 후 입력폼 셋 리셋
                document.getElementById('requestReason').value = "";
                document.getElementById('bookSearchInput').value = "";
                document.getElementById('searchResultsContainer').innerHTML = '<div style="text-align: center; color: #7f8c8d; padding: 20px;">검색 결과가 여기에 표시됩니다. 📚</div>';
                document.getElementById('validationBadge').style.display = 'none';
                document.getElementById('studentName').value = '';
                document.getElementById('studentGrade').value = '';
                document.getElementById('studentClass').value = '';
                document.getElementById('studentNumber').value = '';
                document.getElementById('teacherDept').value = '';
                selectType('student');
                selectedBook = null;

            } catch (e) {
                console.error("신청서 제출 오류:", e);
                alert('신청서 보관 도중 오류가 발생했습니다. 다시 시도해 주세요.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "📚 도서 신청서 제출하기";
            }
        }

        // ======= 🌓 다크모드 동기화 스크립트 =======
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('bookRequestDarkMode', isDark ? 'on' : 'off');
            document.getElementById('darkModeBtn').textContent = isDark ? '☀️ 라이트모드' : '🌙 다크모드';
        }

        function initDarkMode() {
            if (localStorage.getItem('bookRequestDarkMode') === 'on' || localStorage.getItem('darkMode') === 'on') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeBtn').textContent = '☀️ 라이트모드';
            }
        }
    </script>
