<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 도서 신청 시스템</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            font-weight: 400;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.3s, color 0.3s;
        }
        button, a { font-family: inherit; box-sizing: border-box; }

        .app-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            padding: 18px 24px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header-area h1 { margin: 0; font-size: 22px; letter-spacing: 1px; font-weight: 700; }
        .toggle-dark-btn {
            background-color: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.2s;
        }
        .toggle-dark-btn:hover { background-color: rgba(255,255,255,0.2); transform: translateY(-1px); }

        .landing-subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 15px;
            margin: 0;
        }

        .landing-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 520px) { .landing-grid { grid-template-columns: 1fr; } }

        .landing-card {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            padding: 44px 24px 36px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            border: 2px solid transparent;
        }
        .landing-card:hover { transform: translateY(-5px); box-shadow: 0 12px 28px rgba(0,0,0,0.13); }
        .card-apply:hover  { border-color: #27ae60; }
        .card-check:hover  { border-color: #3498db; }

        .card-icon  { font-size: 56px; line-height: 1; }
        .card-title { font-size: 20px; font-weight: 700; color: #2c3e50; margin: 0; }
        .card-desc  { font-size: 13px; color: #7f8c8d; line-height: 1.75; margin: 0; }

        .card-btn {
            color: white;
            border: none;
            padding: 13px 32px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 4px;
        }
        .card-btn:hover { opacity: 0.88; transform: scale(1.03); }
        .card-apply .card-btn { background-color: #27ae60; }
        .card-check .card-btn { background-color: #3498db; }

        /* Dark mode */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            background-attachment: fixed;
        }
        body.dark-mode .landing-card {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.08);
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        body.dark-mode .card-apply:hover { border-color: #27ae60; background: rgba(39,174,96,0.08); }
        body.dark-mode .card-check:hover { border-color: #3498db; background: rgba(52,152,219,0.08); }
        body.dark-mode .card-title  { color: #ffffff; }
        body.dark-mode .card-desc   { color: #a0aec0; }
        body.dark-mode .landing-subtitle { color: #a0aec0; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.03); }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
        body.dark-mode ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-area">
            <h1>📖 상계고 도서관 도서 신청</h1>
            <button class="toggle-dark-btn" id="darkModeBtn" onclick="toggleDarkMode()">🌙 다크모드</button>
        </div>

        <p class="landing-subtitle">아래 메뉴에서 원하는 항목을 선택해 주세요.</p>

        <div class="landing-grid">
            <a href="apply.html" class="landing-card card-apply">
                <div class="card-icon">📚</div>
                <div class="card-title">도서 신청하기</div>
                <div class="card-desc">학교 도서관에 비치를 원하는<br>새 도서를 신청합니다.</div>
                <button class="card-btn">신청하러 가기 →</button>
            </a>
            <a href="check.html" class="landing-card card-check">
                <div class="card-icon">🔍</div>
                <div class="card-title">신청 확인하기</div>
                <div class="card-desc">내가 신청한 도서의<br>심사 결과를 확인합니다.</div>
                <button class="card-btn">확인하러 가기 →</button>
            </a>
        </div>
    </div>

    <script>
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('bookRequestDarkMode', isDark ? 'on' : 'off');
            document.getElementById('darkModeBtn').textContent = isDark ? '☀️ 라이트모드' : '🌙 다크모드';
        }
        function initDarkMode() {
            if (localStorage.getItem('bookRequestDarkMode') === 'on' || localStorage.getItem('darkMode') === 'on') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeBtn').textContent = '☀️ 라이트모드';
            }
        }
        initDarkMode();
    </script>
</body>
</html>
