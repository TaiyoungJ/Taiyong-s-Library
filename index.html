<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 도서 신청 시스템</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            font-weight: 400;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.3s, color 0.3s;
        }
        button, a { font-family: inherit; box-sizing: border-box; }

        .app-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 16px; }

        /* === 상단 다크모드 토글 바 === */
        .top-bar { display: flex; justify-content: flex-end; }
        .toggle-dark-btn {
            background: white;
            border: 1px solid #dee2e6;
            color: #555;
            padding: 7px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.07);
        }
        .toggle-dark-btn:hover { background: #f4f6f8; transform: translateY(-1px); }

        /* === 헤더 === */
        .header-area {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #1a3355 0%, #2c4f7c 100%);
            color: white;
            padding: 22px 28px;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(26,51,85,0.28);
        }
        .header-area h1 { margin: 0; font-size: 22px; letter-spacing: 0.5px; font-weight: 700; }

        /* === 부제목 === */
        .landing-subtitle {
            text-align: center;
            color: #8090a4;
            font-size: 14px;
            margin: 0;
            letter-spacing: 0.3px;
        }

        /* === 카드 그리드 === */
        .landing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 520px) { .landing-grid { grid-template-columns: 1fr; } }

        .landing-card {
            background-color: white;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.05);
            padding: 36px 24px 32px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            border-top: 5px solid transparent;
        }
        .landing-card:hover { transform: translateY(-6px); box-shadow: 0 10px 32px rgba(0,0,0,0.13); }
        .card-apply { border-top-color: #27ae60; }
        .card-check { border-top-color: #3498db; }

        /* === 카드 아이콘 === */
        .card-icon-wrap {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .card-apply .card-icon-wrap { background: linear-gradient(135deg, #d5f5e3, #a9dfbf); }
        .card-check .card-icon-wrap { background: linear-gradient(135deg, #d6eaf8, #a9cce3); }

        .card-title { font-size: 19px; font-weight: 700; color: #1a2b3c; margin: 0; }
        .card-desc  { font-size: 13px; color: #7f8c8d; line-height: 1.8; margin: 0; }

        .card-btn {
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 6px;
        }
        .card-btn:hover { opacity: 0.88; transform: scale(1.03); }
        .card-apply .card-btn { background-color: #27ae60; }
        .card-check .card-btn { background-color: #3498db; }

        /* === 다크모드 === */
        body.dark-mode {
            background: linear-gradient(135deg, #0f1f35 0%, #1a2e4a 100%);
            background-attachment: fixed;
            color: #d0d8e4;
        }
        body.dark-mode .toggle-dark-btn {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.18);
            color: #ccc;
            box-shadow: none;
        }
        body.dark-mode .toggle-dark-btn:hover { background: rgba(255,255,255,0.14); }
        body.dark-mode .header-area {
            background: linear-gradient(135deg, #0a1628 0%, #162540 100%);
            box-shadow: 0 4px 18px rgba(0,0,0,0.5);
        }
        body.dark-mode .landing-card {
            background: rgba(255,255,255,0.05);
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        body.dark-mode .card-apply { border-top-color: #2ecc71; }
        body.dark-mode .card-check { border-top-color: #5dade2; }
        body.dark-mode .card-apply .card-icon-wrap { background: rgba(46,204,113,0.15); }
        body.dark-mode .card-check .card-icon-wrap { background: rgba(93,173,226,0.15); }
        body.dark-mode .card-title  { color: #ffffff; }
        body.dark-mode .card-desc   { color: #8090a4; }
        body.dark-mode .landing-subtitle { color: #606e80; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.03); }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
        body.dark-mode ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <div class="app-container">

        <div class="top-bar">
            <button class="toggle-dark-btn" id="darkModeBtn" onclick="toggleDarkMode()">🌙 다크모드</button>
        </div>

        <div class="header-area">
            <h1>📖 상계고 도서관 도서 신청</h1>
        </div>

        <p class="landing-subtitle">아래 메뉴에서 원하는 항목을 선택해 주세요.</p>

        <div class="landing-grid">
            <a href="apply.html" class="landing-card card-apply">
                <div class="card-icon-wrap">📚</div>
                <div class="card-title">도서 신청하기</div>
                <div class="card-desc">학교 도서관에 비치를 원하는<br>새 도서를 신청합니다.</div>
                <button class="card-btn">신청하러 가기 →</button>
            </a>
            <a href="check.html" class="landing-card card-check">
                <div class="card-icon-wrap">🔍</div>
                <div class="card-title">신청 확인하기</div>
                <div class="card-desc">내가 신청한 도서의<br>심사 결과를 확인합니다.</div>
                <button class="card-btn">확인하러 가기 →</button>
            </a>
        </div>

    </div>

    <script>
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('bookRequestDarkMode', isDark ? 'on' : 'off');
            document.getElementById('darkModeBtn').textContent = isDark ? '☀️ 라이트모드' : '🌙 다크모드';
        }
        function initDarkMode() {
            if (localStorage.getItem('bookRequestDarkMode') === 'on' || localStorage.getItem('darkMode') === 'on') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeBtn').textContent = '☀️ 라이트모드';
            }
        }
        initDarkMode();
    </script>
</body>
</html>
